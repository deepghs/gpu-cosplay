# GPU spec database for gpu-cosplay.
#
# Fields per card:
#   key              snake-case canonical id
#   pretty           display name
#   aliases          list of accepted aliases (case-insensitive, '-' and '_' are equivalent)
#   arch             turing | ampere | ada | hopper | blackwell | volta
#   sm_count         total SMs on the die
#   vram_gb          advertised VRAM size
#   fp32_tflops      dense FP32 from CUDA cores (boost clock)
#   bf16_tc_tflops   dense BF16/FP16 Tensor Core w/ FP32 accumulate; null if no usable TC
#   bandwidth_gbs    peak memory bandwidth
#   tdp_w            board power
#   notes            short text shown in `info`
#
# Sources: NVIDIA Turing / Ampere GA102 / Ada Lovelace / Hopper whitepapers,
# product pages, and Epoch AI ml_hardware.csv. Dense (no 2:1 sparsity) figures.

cards:
